<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GATE VERIFICATION | JAY GOGA KIRANA STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/colors.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, var(--ss-secondary) 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            width: 100%;
            max-width: 450px;
            padding: 3.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
        }
        .brand-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, var(--ss-secondary), var(--ss-primary));
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            box-shadow: 0 15px 30px rgba(16, 163, 74, 0.3);
        }
        .form-control {
            background: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important;
            padding: 12px 18px !important;
            color: white !important;
            font-weight: 800;
            letter-spacing: 4px;
            text-align: center;
        }
        .btn-access {
            background: linear-gradient(45deg, var(--ss-secondary), var(--ss-primary));
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-size: 0.85rem;
            color: white;
        }
        .floating-blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--ss-secondary);
            filter: blur(100px);
            opacity: 0.15;
            border-radius: 50%;
            z-index: 1;
            animation: move 20s infinite alternate;
        }
        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }
    </style>
</head>
<body>
    <div class="floating-blob" style="top: 10%; left: 10%;"></div>
    <div class="floating-blob" style="bottom: 10%; right: 10%; background: var(--ss-primary);"></div>

    <div class="auth-card">
        <div class="brand-logo">
            <i class="bi bi-shield-lock-fill text-white fs-1"></i>
        </div>
        
        <div class="text-center mb-5">
            <h4 class="fw-900 text-white text-uppercase tracking-widest mb-1">Gate Verification</h4>
            <p class="smallest fw-bold text-ss-secondary text-uppercase tracking-widest opacity-75">AUTHENTICATOR NODE ACCESS</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} bg-opacity-10 border-0 text-{{ category }} smallest fw-bold rounded-4 mb-4">
                        <i class="bi bi-info-circle me-2"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-5 text-center">
                <label class="smallest fw-900 text-ss-secondary text-uppercase tracking-widest mb-3 d-block">Verification Matrix Code</label>
                <input type="text" class="form-control" name="token" maxlength="6" required autofocus placeholder="0 0 0 0 0 0">
            </div>
            
            <button type="submit" class="btn btn-access w-100">
                <i class="bi bi-shield-check me-2 fs-6"></i> Authenticate Node
            </button>
        </form>

        <div class="text-center mt-5">
            <a href="{{ url_for('auth.logout') }}" class="smallest fw-900 text-white opacity-25 text-decoration-none text-uppercase tracking-widest hover-opacity-100 transition-all">
                <i class="bi bi-x-circle me-2"></i> Terminate Uplink
            </a>
        </div>
    </div>
</body>
</html>
