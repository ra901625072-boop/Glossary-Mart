<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Jay Goga Kirana Store{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Design System CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/colors.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/core.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/customer/auth.css') }}">

    <!-- Theme Script (Prevents FOUC) -->
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>

    <style>
        /* Auth-only layout: full-screen centered, no navbar gap */
        body { min-height: 100vh; display: flex; flex-direction: column; }
        .auth-page-root {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            min-height: 100vh;
            background: var(--bg-main);
        }
        /* Subtle animated gradient background */
        .auth-page-root::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 20% 30%, var(--ss-primary-10, rgba(212,175,55,0.06)) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 70%, var(--ss-primary-10, rgba(212,175,55,0.04)) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        .auth-page-root > .auth-inner { position: relative; z-index: 1; width: 100%; }
    </style>
</head>

<body>

    {% include 'partials/_toasts.html' %}

    <div class="auth-page-root">
        <div class="auth-inner">
            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- Theme toggle (minimal, bottom-right corner) -->
    <button id="themeToggle" aria-label="Toggle Theme"
        style="position:fixed; bottom:1.5rem; right:1.5rem; z-index:999;
               background:var(--ss-card-bg); border:1px solid var(--ss-border);
               border-radius:50%; width:42px; height:42px;
               display:flex; align-items:center; justify-content:center;
               cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,0.15);">
        <i class="bi bi-moon-stars fs-5 text-ss-primary" id="themeIcon"></i>
    </button>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Toast init
        document.addEventListener('DOMContentLoaded', function() {
            [].slice.call(document.querySelectorAll('.toast')).forEach(function(el) {
                new bootstrap.Toast(el, { autohide: true, delay: 5000 }).show();
            });
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
